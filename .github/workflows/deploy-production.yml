# Деплой Laravel backend на VPS по SSH (git pull + deploy/post-pull.sh).
#
# Запуск:
#   • вручную: Actions → Deploy production → Run workflow
#   • автоматически: после успешного завершения workflow «CI» на push в main/master
#
# Секреты: см. docs/DEPLOY/15_github_actions.md

name: Deploy production

on:
  workflow_dispatch:
  workflow_run:
    workflows: [CI]
    types: [completed]
    branches: [main, master]

concurrency:
  group: production-deploy
  cancel-in-progress: false

jobs:
  deploy:
    name: SSH deploy
    runs-on: ubuntu-latest
    timeout-minutes: 30
    environment: production

    # Автодеплой только после успешного CI на push; ручной запуск — всегда
    if: >-
      github.event_name == 'workflow_dispatch' ||
      (github.event.workflow_run.conclusion == 'success' &&
       github.event.workflow_run.event == 'push' &&
       (github.event.workflow_run.head_branch == 'main' ||
        github.event.workflow_run.head_branch == 'master'))

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.2.1
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_PRIVATE_KEY }}
          command_timeout: 25m
          request_pty: false
          script: |
            set -euo pipefail
            DEPLOY_PATH="${{ secrets.DEPLOY_PATH }}"
            if [ -z "${DEPLOY_PATH:-}" ]; then
              echo "DEPLOY_PATH secret is not set in GitHub Actions."
              exit 1
            fi
            cd "$DEPLOY_PATH"
            git config --global --add safe.directory "$DEPLOY_PATH" || true
            git fetch origin
            # На VPS часто лежат правки/scp в deploy/ — checkout падает. Чистим только deploy/ от мусора,
            # затем жёстко совпадаем с origin (backend/.env и прочие untracked вне deploy/ не трогаем).
            git clean -fd -- deploy/ 2>/dev/null || true
            if git show-ref --verify --quiet refs/remotes/origin/main; then
              git reset --hard origin/main
            elif git show-ref --verify --quiet refs/remotes/origin/master; then
              git reset --hard origin/master
            else
              echo "No origin/main or origin/master found."
              exit 1
            fi
            chmod +x deploy/post-pull.sh
            ./deploy/post-pull.sh
