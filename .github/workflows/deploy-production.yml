# Деплой: Laravel на VPS (git pull + post-pull.sh) + сборка React SPA на runner и rsync frontend/dist.
#
# Запуск:
#   • вручную: Actions → Deploy production → Run workflow
#   • автоматически: после успешного завершения workflow «CI» на push в main/master
#
# Секреты: см. docs/DEPLOY/15_github_actions.md

name: Deploy production

on:
  workflow_dispatch:
  workflow_run:
    workflows: [CI]
    types: [completed]
    branches: [main, master]

concurrency:
  group: production-deploy
  cancel-in-progress: false

jobs:
  deploy:
    name: Backend + frontend dist
    runs-on: ubuntu-latest
    timeout-minutes: 30
    environment: production

    # Автодеплой только после успешного CI на push; ручной запуск — всегда
    if: >-
      github.event_name == 'workflow_dispatch' ||
      (github.event.workflow_run.conclusion == 'success' &&
       github.event.workflow_run.event == 'push' &&
       (github.event.workflow_run.head_branch == 'main' ||
        github.event.workflow_run.head_branch == 'master'))

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Build SPA (frontend/dist)
        working-directory: frontend
        env:
          # Пусто = тот же origin, что у страницы (Nginx + Laravel). Иначе полный URL API.
          VITE_API_URL: ${{ secrets.FRONTEND_VITE_API_URL }}
        run: npm ci && npm run build

      - name: Deploy backend via SSH
        uses: appleboy/ssh-action@v1.2.1
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_PRIVATE_KEY }}
          command_timeout: 25m
          request_pty: false
          script: |
            set -euo pipefail
            DEPLOY_PATH="${{ secrets.DEPLOY_PATH }}"
            if [ -z "${DEPLOY_PATH:-}" ]; then
              echo "DEPLOY_PATH secret is not set in GitHub Actions."
              exit 1
            fi
            cd "$DEPLOY_PATH"
            git config --global --add safe.directory "$DEPLOY_PATH" || true
            git fetch origin
            # На VPS часто лежат правки/scp в deploy/ — checkout падает. Чистим только deploy/ от мусора,
            # затем жёстко совпадаем с origin (backend/.env и прочие untracked вне deploy/ не трогаем).
            git clean -fd -- deploy/ 2>/dev/null || true
            if git show-ref --verify --quiet refs/remotes/origin/main; then
              git reset --hard origin/main
            elif git show-ref --verify --quiet refs/remotes/origin/master; then
              git reset --hard origin/master
            else
              echo "No origin/main or origin/master found."
              exit 1
            fi
            chmod +x deploy/post-pull.sh
            ./deploy/post-pull.sh

      - name: Rsync frontend dist to VPS
        env:
          SSH_PRIVATE_KEY: ${{ secrets.DEPLOY_SSH_PRIVATE_KEY }}
          DEPLOY_HOST_RAW: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
          DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}
        run: |
          set -euo pipefail
          if [ -z "${DEPLOY_PATH:-}" ]; then
            echo "DEPLOY_PATH is empty"
            exit 1
          fi
          mkdir -p ~/.ssh
          echo "$SSH_PRIVATE_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          if [[ "$DEPLOY_HOST_RAW" =~ ^([^:]+):([0-9]+)$ ]]; then
            SSH_HOST="${BASH_REMATCH[1]}"
            SSH_PORT="${BASH_REMATCH[2]}"
          else
            SSH_HOST="$DEPLOY_HOST_RAW"
            SSH_PORT=22
          fi
          ssh -i "$HOME/.ssh/deploy_key" -o StrictHostKeyChecking=accept-new -p "$SSH_PORT" \
            "${DEPLOY_USER}@${SSH_HOST}" "mkdir -p '${DEPLOY_PATH}/frontend/dist'"
          rsync -avz --delete \
            -e "ssh -i $HOME/.ssh/deploy_key -o StrictHostKeyChecking=accept-new -p $SSH_PORT" \
            frontend/dist/ "${DEPLOY_USER}@${SSH_HOST}:${DEPLOY_PATH}/frontend/dist/"
