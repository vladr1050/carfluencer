# Деплой Laravel backend на VPS по SSH (после git pull на сервере).
#
# Секреты репозитория (Settings → Secrets and variables → Actions):
#   DEPLOY_HOST          — IP или домен (например 135.181.36.104)
#   DEPLOY_USER          — SSH-пользователь (например evoapp)
#   DEPLOY_SSH_PRIVATE_KEY — полный приватный ключ OpenSSH (-----BEGIN ... PRIVATE KEY-----)
#   DEPLOY_PATH          — абсолютный путь к корню git-репозитория на сервере (например /var/www/carfluencer)
#
# Опционально:
#   DEPLOY_PORT          — порт SSH (по умолчанию 22)
#   DEPLOY_SSH_KNOWN_HOSTS — вывод: ssh-keyscan -p PORT -H HOST (защита от MITM)
#
# На сервере один раз: git clone репозитория в DEPLOY_PATH, настроить .env в backend/,
# nginx, supervisor, cron — см. docs/DEPLOY/12_vps_production.md

name: Deploy production

on:
  workflow_dispatch:
  push:
    branches: [main, master]
    paths:
      - 'backend/**'
      - 'deploy/post-pull.sh'
      - '.github/workflows/deploy-production.yml'

concurrency:
  group: production-deploy
  cancel-in-progress: false

jobs:
  deploy:
    name: SSH deploy
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.2.1
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_PRIVATE_KEY }}
          # Порт SSH: по умолчанию 22. Нестандартный — укажите в DEPLOY_HOST как host:port (см. appleboy/ssh-action).
          command_timeout: 25m
          request_pty: false
          script: |
            set -euo pipefail
            DEPLOY_PATH="${{ secrets.DEPLOY_PATH }}"
            if [ -z "${DEPLOY_PATH:-}" ]; then
              echo "DEPLOY_PATH secret is not set in GitHub Actions."
              exit 1
            fi
            cd "$DEPLOY_PATH"
            git config --global --add safe.directory "$DEPLOY_PATH" || true
            git fetch origin
            if git show-ref --verify --quiet refs/remotes/origin/main; then
              git checkout -B main origin/main
            elif git show-ref --verify --quiet refs/remotes/origin/master; then
              git checkout -B master origin/master
            else
              echo "No origin/main or origin/master found."
              exit 1
            fi
            chmod +x deploy/post-pull.sh
            ./deploy/post-pull.sh
